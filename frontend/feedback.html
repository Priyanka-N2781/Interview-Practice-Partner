<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Interview Practice Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <!-- html2pdf library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container py-5 fade-in">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Interview Feedback Report</h2>
            <div>
                <button class="btn btn-secondary-custom me-2" onclick="window.location.href='index.html'">Go to Home</button>
                <button class="btn btn-primary-custom shadow-sm" id="downloadPdfBtn"><i class="bi bi-file-earmark-pdf-fill me-1"></i> Download PDF</button>
            </div>
        </div>

        <div id="reportContent">
            <!-- Loading Indicator -->
            <div id="loadingReport" class="text-center text-white my-5">
                <div class="spinner-border" role="status"></div>
                <p class="mt-3">Analyzing your performance... This might take a minute.</p>
            </div>

            <!-- Content Area (Hidden Initially) -->
            <div id="reportData" class="d-none">
                <!-- Header Card -->
                <div class="glass-card mb-4 text-center">
                    <h3 id="reportCandidateName">Candidate Name</h3>
                    <p class="text-muted mb-3" id="reportRoleContext">Role | Experience Level</p>
                    <div class="display-1 fw-bold text-primary mb-2" id="reportScore">--/100</div>
                    <p class="h5 text-info mb-3" id="reportResumeScore">Resume ATS Match: --/100</p>
                    <p class="lead" id="reportSummary">Summary goes here.</p>
                </div>

                <div class="row">
                    <!-- Strengths -->
                    <div class="col-md-4 mb-4">
                        <div class="glass-card h-100 border-success border-top border-4">
                            <h4 class="text-success"><i class="bi bi-check-circle-fill me-2"></i>Strengths</h4>
                            <ul id="reportStrengths" class="mt-3 ps-3">
                            </ul>
                        </div>
                    </div>
                    
                    <!-- Weaknesses -->
                    <div class="col-md-4 mb-4">
                        <div class="glass-card h-100 border-danger border-top border-4">
                            <h4 class="text-danger"><i class="bi bi-x-circle-fill me-2"></i>Areas to Improve</h4>
                            <ul id="reportWeaknesses" class="mt-3 ps-3">
                            </ul>
                        </div>
                    </div>

                    <!-- Suggestions -->
                    <div class="col-md-4 mb-4">
                        <div class="glass-card h-100 border-primary border-top border-4">
                            <h4 class="text-primary"><i class="bi bi-lightbulb-fill me-2"></i>Actionable Tips</h4>
                            <ul id="reportImprovements" class="mt-3 ps-3">
                            </ul>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <!-- Resume Recommendations -->
                    <div class="col-12 mb-4">
                        <div class="glass-card border-info border-top border-4">
                            <h4 class="text-info"><i class="bi bi-file-earmark-person-fill me-2"></i>Resume Recommendations</h4>
                            <ul id="reportResumeFeedback" class="mt-3 ps-3">
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Interview Transcript -->
                <div class="glass-card mt-2">
                    <h4 class="mb-4 border-bottom pb-2">Interview Transcript</h4>
                    <div id="reportTranscript">
                        <!-- Q&A Pairs injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
