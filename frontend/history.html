<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview History - Interview Practice Partner</title>
    <meta name="description" content="View all your past mock interview sessions with full reports.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .history-card {
            background: rgba(255,255,255,0.93);
            border-radius: 16px;
            border: 1px solid rgba(0,86,179,0.15);
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            margin-bottom: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .history-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0,86,179,0.18);
        }
        .history-card-header {
            background: linear-gradient(90deg, #0056b3, #007bff);
            color: white;
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .history-card-header:hover { filter: brightness(1.08); }
        .score-badge {
            font-size: 1.6rem;
            font-weight: 800;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 4px 16px;
            min-width: 90px;
            text-align: center;
        }
        .score-badge.high { background: rgba(40,200,100,0.3); }
        .score-badge.mid  { background: rgba(255,193,7,0.3); }
        .score-badge.low  { background: rgba(220,53,69,0.3); }
        .detail-section { padding: 1.5rem; }
        .qa-block { background: #f0f5ff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
        .qa-block .q { color: #0056b3; font-weight: 600; margin-bottom: 0.35rem; }
        .qa-block .a { color: #333; background: white; border-radius: 8px; padding: 0.5rem 0.75rem; }
        .tag-pill { display: inline-block; background: #e3f2fd; color: #0056b3; border-radius: 50px; padding: 2px 12px; font-size: 0.8rem; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
        .list-check li::before { content: "✓ "; color: #28a745; font-weight: 700; }
        .list-cross li::before { content: "✗ "; color: #dc3545; font-weight: 700; }
        .list-tip li::before   { content: "→ "; color: #007bff; font-weight: 700; }
        .list-resume li::before { content: "📄 "; }
        ul.list-check, ul.list-cross, ul.list-tip, ul.list-resume { list-style: none; padding-left: 0; }
        .nav-top { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .nav-top a { color: white; text-decoration: none; font-weight: 600; opacity: 0.85; transition: opacity 0.2s; }
        .nav-top a:hover { opacity: 1; }
        .no-history { text-align: center; color: rgba(255,255,255,0.85); padding: 4rem 2rem; }
        .resume-score-chip { font-size: 0.85rem; background: rgba(255,255,255,0.18); border-radius: 50px; padding: 2px 10px; margin-left: 8px; }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; font-weight: 700; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

    <!-- Top Nav -->
    <nav class="nav-top">
        <span class="fw-bold fs-5 text-white"><i class="bi bi-briefcase-fill me-2"></i>Interview Practice Partner</span>
        <div class="d-flex gap-3">
            <a href="index.html"><i class="bi bi-house me-1"></i>Home</a>
            <a href="setup.html"><i class="bi bi-play-circle me-1"></i>New Interview</a>
            <a href="history.html" style="opacity:1; border-bottom: 2px solid white; padding-bottom:2px;"><i class="bi bi-clock-history me-1"></i>History</a>
        </div>
    </nav>

    <div class="container py-4 fade-in">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h2 class="text-white fw-bold mb-0"><i class="bi bi-clock-history me-2"></i>Interview History</h2>
                <p class="text-light opacity-75 mb-0 small">All your past sessions with full Q&A, scores & reports</p>
            </div>
            <a href="setup.html" class="btn btn-primary-custom px-4">
                <i class="bi bi-plus-circle me-1"></i> New Interview
            </a>
        </div>

        <!-- Search & Filter Bar -->
        <div class="glass-card p-3 mb-4" style="border-radius:14px; padding: 1rem !important;">
            <div class="row g-2 align-items-center">
                <div class="col-md-5">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search by name or role...">
                </div>
                <div class="col-md-3">
                    <select id="sortSelect" class="form-select">
                        <option value="newest">Sort: Newest First</option>
                        <option value="oldest">Sort: Oldest First</option>
                        <option value="score_high">Sort: Highest Score</option>
                        <option value="score_low">Sort: Lowest Score</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-secondary-custom w-100" onclick="clearAllHistory()">
                        <i class="bi bi-trash me-1"></i>Clear All
                    </button>
                </div>
                <div class="col-md-2 text-end">
                    <span class="text-muted small" id="countLabel">Loading...</span>
                </div>
            </div>
        </div>

        <!-- History List -->
        <div id="historyContainer">
            <div class="no-history">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-3">Loading your interview history...</p>
            </div>
        </div>
    </div>

    <!-- Full Report Modal -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(90deg,#0056b3,#007bff); color:white;">
                    <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-text me-2"></i>Full Interview Report</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="modalReportBody">Loading...</div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-primary-custom" id="modalDownloadBtn"><i class="bi bi-download me-1"></i>Download PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://interview-practice-partner-uz4r.onrender.com';
        let allInterviews = [];
        let currentModalData = null;

        // Auth guard
        const userId   = localStorage.getItem('ipp_user_id');
        const username = localStorage.getItem('ipp_username');
        if (!userId) { window.location.href = 'login.html'; }

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE_URL}/history?user_id=${userId}`);
                allInterviews = await res.json();
                renderHistory(allInterviews);
            } catch (e) {
                document.getElementById('historyContainer').innerHTML = `
                    <div class="no-history">
                        <i class="bi bi-wifi-off fs-1 d-block mb-3"></i>
                        <p>Cannot connect to the backend server. Make sure it is running.</p>
                    </div>`;
            }
        }

        function renderHistory(interviews) {
            const container = document.getElementById('historyContainer');
            document.getElementById('countLabel').innerText = `${interviews.length} session${interviews.length !== 1 ? 's' : ''}`;

            if (!interviews.length) {
                container.innerHTML = `
                    <div class="no-history">
                        <i class="bi bi-journal-x fs-1 d-block mb-3"></i>
                        <p class="fs-5">No interview sessions found. <a href="setup.html" class="text-white fw-bold">Start your first interview!</a></p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            interviews.forEach(iv => {
                const scoreClass = iv.overall_score >= 75 ? 'high' : iv.overall_score >= 50 ? 'mid' : 'low';
                const scoreLabel = iv.overall_score != null ? iv.overall_score + '/100' : 'Pending';
                const dateStr = iv.date ? formatDate(iv.date) : '—';
                const card = document.createElement('div');
                card.className = 'history-card';
                card.id = `card-${iv.id}`;
                card.innerHTML = `
                    <div class="history-card-header" onclick="toggleCard(${iv.id})">
                        <div class="d-flex flex-column flex-md-row align-items-md-center gap-2 flex-grow-1">
                            <div>
                                <div class="fw-bold fs-5"><i class="bi bi-person-circle me-2"></i>${escHtml(iv.candidate_name || 'Unknown')}</div>
                                <div class="small opacity-75 mt-1">
                                    <span class="me-3"><i class="bi bi-briefcase me-1"></i>${escHtml(iv.role)}</span>
                                    <span class="me-3"><i class="bi bi-speedometer2 me-1"></i>${escHtml(iv.difficulty || '—')}</span>
                                    <span><i class="bi bi-calendar3 me-1"></i>${dateStr}</span>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="score-badge ${scoreClass}">${scoreLabel}</div>
                            <i class="bi bi-chevron-down fs-5 toggle-icon-${iv.id}"></i>
                        </div>
                    </div>
                    <div class="detail-section d-none" id="detail-${iv.id}">
                        <div class="d-flex justify-content-end mb-3 gap-2">
                            <button class="btn btn-sm btn-primary-custom" onclick="openFullReport(${iv.id})">
                                <i class="bi bi-file-earmark-text me-1"></i>Full Report
                            </button>
                            <button class="btn btn-sm btn-secondary-custom" onclick="deleteInterview(${iv.id})">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </div>
                        <div id="detail-content-${iv.id}">
                            <div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Loading details...</p></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function toggleCard(id) {
            const detail = document.getElementById(`detail-${id}`);
            const icon = document.querySelector(`.toggle-icon-${id}`);
            if (detail.classList.contains('d-none')) {
                detail.classList.remove('d-none');
                icon.classList.replace('bi-chevron-down', 'bi-chevron-up');
                await loadDetailContent(id);
            } else {
                detail.classList.add('d-none');
                icon.classList.replace('bi-chevron-up', 'bi-chevron-down');
            }
        }

        async function loadDetailContent(id) {
            const contentEl = document.getElementById(`detail-content-${id}`);
            if (contentEl.dataset.loaded === 'true') return;

            try {
                const res = await fetch(`${API_BASE_URL}/report/${id}`);
                const data = await res.json();
                contentEl.dataset.loaded = 'true';
                contentEl.innerHTML = buildDetailHTML(data);
            } catch (e) {
                contentEl.innerHTML = `<p class="text-danger">Failed to load details.</p>`;
            }
        }

        function buildDetailHTML(data) {
            const tags = [
                data.experience_level, data.interview_type, data.difficulty,
                `${data.max_questions || '?'} Questions`,
                data.resume_match_score != null ? `ATS Score: ${data.resume_match_score}/100` : null
            ].filter(Boolean);

            const tagsHtml = tags.map(t => `<span class="tag-pill">${escHtml(t)}</span>`).join('');
            const summaryHtml = data.feedback ? `<div class="alert alert-info mb-3"><i class="bi bi-chat-quote me-1"></i>${escHtml(data.feedback)}</div>` : '';

            const strHtml = buildList(data.strengths, 'list-check');
            const weakHtml = buildList(data.weaknesses, 'list-cross');
            const tipHtml = buildList(data.improvements, 'list-tip');
            const resHtml = buildList(data.resume_recommendations, 'list-resume');

            let qaHtml = '';
            if (data.qa_pairs && data.qa_pairs.length) {
                qaHtml = data.qa_pairs.map((qa, i) => `
                    <div class="qa-block">
                        <div class="q">Q${i + 1}: ${escHtml(qa.question)}</div>
                        <div class="a">${escHtml(qa.answer || '[No answer provided]')}</div>
                    </div>
                `).join('');
            } else {
                qaHtml = `<p class="text-muted">No Q&A recorded.</p>`;
            }

            return `
                <div class="mb-3">${tagsHtml}</div>
                ${summaryHtml}
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <div class="section-label">💪 Strengths</div>
                        <ul class="list-check">${strHtml}</ul>
                    </div>
                    <div class="col-md-4">
                        <div class="section-label">⚠️ Areas to Improve</div>
                        <ul class="list-cross">${weakHtml}</ul>
                    </div>
                    <div class="col-md-4">
                        <div class="section-label">💡 Actionable Tips</div>
                        <ul class="list-tip">${tipHtml}</ul>
                    </div>
                </div>
                ${resHtml ? `<div class="mb-3"><div class="section-label">📄 Resume Recommendations</div><ul class="list-resume">${resHtml}</ul></div>` : ''}
                <hr>
                <div class="section-label">🗒️ Full Q&A Transcript</div>
                <div>${qaHtml}</div>
            `;
        }

        function buildList(items, cls) {
            if (!items || !items.length) return '<li>—</li>';
            return items.map(i => `<li>${escHtml(i)}</li>`).join('');
        }

        async function openFullReport(id) {
            const modal = new bootstrap.Modal(document.getElementById('reportModal'));
            const body = document.getElementById('modalReportBody');
            body.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-3">Loading full report...</p></div>';
            modal.show();

            try {
                const res = await fetch(`${API_BASE_URL}/report/${id}`);
                const data = await res.json();
                currentModalData = data;

                const scoreClass = data.overall_score >= 75 ? 'success' : data.overall_score >= 50 ? 'warning' : 'danger';
                body.innerHTML = `
                    <div id="printable-report">
                        <div class="text-center mb-4 p-4 rounded-3" style="background:linear-gradient(135deg,#0056b3,#007bff); color:white;">
                            <h3 class="fw-bold mb-1">${escHtml(data.candidate_name || 'Candidate')}</h3>
                            <p class="mb-2 opacity-75">${escHtml(data.role)} | ${escHtml(data.experience_level)} | ${escHtml(data.difficulty)} | ${formatDate(data.date)}</p>
                            <div class="d-flex justify-content-center gap-4 mt-3">
                                <div><div class="fs-2 fw-bold">${data.overall_score != null ? data.overall_score + '/100' : '—'}</div><div class="small opacity-75">Interview Score</div></div>
                                <div><div class="fs-2 fw-bold">${data.resume_match_score != null ? data.resume_match_score + '/100' : '—'}</div><div class="small opacity-75">ATS Match</div></div>
                                <div><div class="fs-2 fw-bold">${data.qa_pairs ? data.qa_pairs.length : 0}</div><div class="small opacity-75">Questions</div></div>
                            </div>
                        </div>

                        ${data.feedback ? `<div class="alert alert-info"><strong>Summary:</strong> ${escHtml(data.feedback)}</div>` : ''}

                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <h6 class="text-success fw-bold">✅ Strengths</h6>
                                <ul class="list-check">${buildList(data.strengths, 'list-check')}</ul>
                            </div>
                            <div class="col-md-4">
                                <h6 class="text-danger fw-bold">❌ Weaknesses</h6>
                                <ul class="list-cross">${buildList(data.weaknesses, 'list-cross')}</ul>
                            </div>
                            <div class="col-md-4">
                                <h6 class="text-primary fw-bold">💡 Tips</h6>
                                <ul class="list-tip">${buildList(data.improvements, 'list-tip')}</ul>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h6 class="text-secondary fw-bold">📄 Resume Recommendations</h6>
                            <ul class="list-resume">${buildList(data.resume_recommendations, 'list-resume')}</ul>
                        </div>

                        <hr>
                        <h6 class="fw-bold mb-3">🗒️ Full Interview Transcript</h6>
                        ${(data.qa_pairs || []).map((qa, i) => `
                            <div class="qa-block mb-3">
                                <div class="q">Q${i+1}: ${escHtml(qa.question)}</div>
                                <div class="a mt-2">${escHtml(qa.answer || '[No answer provided]')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                body.innerHTML = `<p class="text-danger">Failed to load report.</p>`;
            }
        }

        document.getElementById('modalDownloadBtn').addEventListener('click', () => {
            const el = document.getElementById('printable-report');
            if (!el || !currentModalData) return;
            const opt = {
                margin: 0.5,
                filename: `${currentModalData.candidate_name || 'Interview'}_Report.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(el).save();
        });

        function deleteInterview(id) {
            if (!confirm('Delete this interview session? This cannot be undone.')) return;
            fetch(`${API_BASE_URL}/delete-interview/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(() => {
                    document.getElementById(`card-${id}`).remove();
                    allInterviews = allInterviews.filter(i => i.id !== id);
                    document.getElementById('countLabel').innerText = `${allInterviews.length} session${allInterviews.length !== 1 ? 's' : ''}`;
                })
                .catch(() => alert('Failed to delete. Please try again.'));
        }

        function clearAllHistory() {
            if (!confirm('Delete ALL your interview history? This cannot be undone.')) return;
            fetch(`${API_BASE_URL}/clear-history?user_id=${userId}`, { method: 'DELETE' })
                .then(() => loadHistory())
                .catch(() => alert('Failed to clear history.'));
        }

        // Search & Sort
        document.getElementById('searchInput').addEventListener('input', filterAndSort);
        document.getElementById('sortSelect').addEventListener('change', filterAndSort);

        function filterAndSort() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;

            let filtered = allInterviews.filter(iv =>
                (iv.candidate_name || '').toLowerCase().includes(query) ||
                (iv.role || '').toLowerCase().includes(query)
            );

            if (sort === 'newest') filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            else if (sort === 'score_high') filtered.sort((a, b) => (b.overall_score || 0) - (a.overall_score || 0));
            else if (sort === 'score_low') filtered.sort((a, b) => (a.overall_score || 0) - (b.overall_score || 0));

            renderHistory(filtered);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr + (dateStr.endsWith('Z') ? '' : 'Z'));
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        loadHistory();
    </script>
</body>
</html>
