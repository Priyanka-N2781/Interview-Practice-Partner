<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Practice realistic AI-powered interviews with instant feedback.">
    <title>Interview Practice Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-top { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .nav-top a { color: white; text-decoration: none; font-weight: 600; opacity: 0.85; transition: opacity 0.2s; }
        .nav-top a:hover { opacity: 1; }
        .user-chip { background: rgba(255,255,255,0.2); border-radius: 50px; padding: 4px 16px; color: white; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .stat-card { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 1.25rem 2rem; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .stat-card .num { font-size: 2rem; font-weight: 800; }
        .stat-card .lbl { font-size: 0.85rem; opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <span class="fw-bold fs-5 text-white"><i class="bi bi-briefcase-fill me-2"></i>Interview Practice Partner</span>
        <div class="d-flex align-items-center gap-3">
            <a href="history.html"><i class="bi bi-clock-history me-1"></i>My History</a>
            <div class="user-chip"><i class="bi bi-person-circle"></i><span id="navUsername">...</span></div>
            <button class="btn btn-sm btn-secondary-custom" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
        </div>
    </nav>

    <div class="container d-flex flex-column justify-content-center align-items-center flex-grow-1 text-center fade-in py-5">
        <h1 class="hero-title">Welcome back, <span id="heroName">...</span>!</h1>
        <p class="hero-subtitle">Your personal AI-powered mock interview coach. Ready when you are.</p>

        <!-- Stats Row -->
        <div class="d-flex gap-3 mb-4 flex-wrap justify-content-center" id="statsRow">
            <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Interviews Done</div></div>
            <div class="stat-card"><div class="num" id="statAvg">—</div><div class="lbl">Average Score</div></div>
            <div class="stat-card"><div class="num" id="statBest">—</div><div class="lbl">Best Score</div></div>
        </div>

        <div class="glass-card mt-2 p-5">
            <h3 class="mb-4">Ready for your next interview?</h3>
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a href="setup.html" class="btn btn-primary-custom btn-lg shadow-sm"><i class="bi bi-play-circle me-1"></i>Start New Interview</a>
                <a href="history.html" class="btn btn-secondary-custom btn-lg shadow-sm"><i class="bi bi-clock-history me-1"></i>View My History</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://interview-practice-partner-uz4r.onrender.com';

        // Auth guard
        const userId   = localStorage.getItem('ipp_user_id');
        const username = localStorage.getItem('ipp_username');

        if (!userId) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('navUsername').innerText = username;
            document.getElementById('heroName').innerText    = username;
            loadStats();
        }

        async function loadStats() {
            try {
                const res  = await fetch(`${API_BASE_URL}/history?user_id=${userId}`);
                const data = await res.json();

                const scored = data.filter(d => d.overall_score != null);
                const total  = data.length;
                const avg    = scored.length ? Math.round(scored.reduce((s, d) => s + d.overall_score, 0) / scored.length) : '—';
                const best   = scored.length ? Math.max(...scored.map(d => d.overall_score)) : '—';

                document.getElementById('statTotal').innerText = total;
                document.getElementById('statAvg').innerText   = avg !== '—' ? avg + '/100' : '—';
                document.getElementById('statBest').innerText  = best !== '—' ? best + '/100' : '—';
            } catch (e) { /* backend not ready yet */ }
        }

        function logout() {
            localStorage.removeItem('ipp_user_id');
            localStorage.removeItem('ipp_username');
            localStorage.removeItem('ipp_email');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
