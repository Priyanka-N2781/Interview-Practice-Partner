<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - Interview Practice Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4 flex-grow-1 d-flex flex-column fade-in">
        
        <div class="glass-card mb-4 p-3 d-flex justify-content-between align-items-center">
            <div>
                <h5 class="m-0 text-primary fw-bold" id="questionHeader">Question 1</h5>
            </div>
            <div class="d-flex gap-4">
                <div class="text-center">
                    <small class="text-muted d-block">Timer</small>
                    <span class="fw-bold fs-5" id="timerDisplay">00:00</span>
                </div>
                <div class="text-center">
                    <small class="text-muted d-block">Voice Mode</small>
                    <div class="form-check form-switch d-inline-block">
                        <input class="form-check-input" type="checkbox" id="voiceToggle" checked>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card flex-grow-1 d-flex flex-column p-4 mb-4" id="chatArea">
            <div class="chat-container flex-grow-1" id="chatContainer">
                <!-- Chat bubbles will be injected here -->
                <div class="text-center text-muted mt-5" id="loadingIndicator">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Connecting to AI Interviewer...</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-3">
            <div class="row align-items-center">
                <div class="col-md-9 mb-3 mb-md-0">
                    <textarea class="form-control" id="answerInput" rows="3" placeholder="Type your answer here..."></textarea>
                </div>
                <div class="col-md-3 d-flex flex-column align-items-center justify-content-center gap-2">
                    <button class="btn btn-primary-custom w-100" id="submitAnswerBtn" disabled>Submit Answer</button>
                    <button class="btn btn-secondary-custom w-100 mt-2 d-none" id="finishInterviewBtn">Finish Interview</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
