<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Interview Practice Partner</title>
    <meta name="description" content="Login or create your account to access your personalized interview practice dashboard.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-card { max-width: 440px; width: 100%; }
        .tab-toggle { display: flex; background: rgba(255,255,255,0.15); border-radius: 50px; padding: 4px; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: white; border-radius: 50px; font-weight: 600; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { background: white; color: #0056b3; }
        .auth-card .form-control, .auth-card .form-select { border-radius: 12px; border: 2px solid #e0e8f5; padding: 10px 14px; transition: border-color 0.2s; }
        .auth-card .form-control:focus { border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .brand-logo { font-size: 2.5rem; font-weight: 800; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
        .error-msg { background: #fff0f0; color: #c0392b; border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; display: none; margin-bottom: 1rem; }
        .success-msg { background: #f0fff4; color: #27ae60; border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; display: none; margin-bottom: 1rem; }
        .password-wrapper { position: relative; }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; background: none; border: none; }
    </style>
</head>
<body>
<div class="container d-flex flex-column align-items-center justify-content-center flex-grow-1 py-5 fade-in">

    <div class="mb-4 text-center">
        <div class="brand-logo"><i class="bi bi-briefcase-fill me-2"></i>Interview Practice Partner</div>
        <p class="text-light opacity-75 mt-1">Your personal AI mock interview coach</p>
    </div>

    <div class="auth-card glass-card">

        <!-- Tab Toggle -->
        <div class="tab-toggle" id="tabToggle">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Error / Success -->
        <div class="error-msg" id="errorMsg"><i class="bi bi-exclamation-circle me-1"></i><span id="errorText"></span></div>
        <div class="success-msg" id="successMsg"><i class="bi bi-check-circle me-1"></i><span id="successText"></span></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-6" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
            <p class="text-center mt-3 text-muted small">Don't have an account? <a href="#" onclick="switchTab('register')" class="text-primary fw-bold">Create one</a></p>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="d-none">
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control" id="regName" placeholder="e.g. Priyanka" required autocomplete="name">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password <span class="text-muted fw-normal small">(min. 6 characters)</span></label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="regPassword" placeholder="Create a password" required minlength="6">
                    <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-6" id="registerBtn">
                <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
            <p class="text-center mt-3 text-muted small">Already have an account? <a href="#" onclick="switchTab('login')" class="text-primary fw-bold">Login</a></p>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000'
        : 'https://interview-practice-partner-uz4r.onrender.com';

    // If already logged in, redirect
    if (localStorage.getItem('ipp_user_id')) {
        window.location.href = 'index.html';
    }

    function switchTab(tab) {
        const loginForm    = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab     = document.getElementById('loginTab');
        const registerTab  = document.getElementById('registerTab');
        hideMessages();

        if (tab === 'login') {
            loginForm.classList.remove('d-none');
            registerForm.classList.add('d-none');
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.classList.add('d-none');
            registerForm.classList.remove('d-none');
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
        }
    }

    function showError(msg) {
        document.getElementById('errorText').innerText = msg;
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        document.getElementById('successText').innerText = msg;
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('errorMsg').style.display   = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
        } else {
            input.type = 'password';
            btn.innerHTML = '<i class="bi bi-eye"></i>';
        }
    }

    function saveUserAndRedirect(user) {
        localStorage.setItem('ipp_user_id',   user.user_id);
        localStorage.setItem('ipp_username',  user.username);
        localStorage.setItem('ipp_email',     user.email);
        window.location.href = 'index.html';
    }

    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';

        try {
            const res = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                })
            });
            const data = await res.json();
            if (data.error) { showError(data.error); }
            else { saveUserAndRedirect(data); }
        } catch (err) {
            showError('Cannot connect to server. Make sure the backend is running.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Login';
        }
    });

    // REGISTER
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating account...';

        try {
            const res = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('regName').value,
                    email:    document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value
                })
            });
            const data = await res.json();
            if (data.error) { showError(data.error); }
            else {
                showSuccess('Account created! Logging you in...');
                setTimeout(() => saveUserAndRedirect(data), 800);
            }
        } catch (err) {
            showError('Cannot connect to server. Make sure the backend is running.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-plus me-1"></i>Create Account';
        }
    });
</script>
</body>
</html>
